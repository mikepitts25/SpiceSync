<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B0B0E"/>
      <stop offset="100%" style="stop-color:#1A1A2E"/>
    </linearGradient>
    <linearGradient id="diceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B"/>
      <stop offset="100%" style="stop-color:#E85555"/>
    </linearGradient>
    <filter id="sparkGlow">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bgGrad2)" rx="200"/>
  
  <!-- Dice Cube -->
  <g transform="translate(512, 512)">
    <!-- Front face -->
    <path d="M -150 -100 L 150 -100 L 150 150 L -150 150 Z" 
          fill="url(#diceGrad)" stroke="#FF8E8E" stroke-width="4"/>
    
    <!-- Top face -->
    <path d="M -150 -100 L -80 -180 L 220 -180 L 150 -100 Z" 
          fill="#FF8E8E" stroke="#FFB3B3" stroke-width="4"/>
    
    <!-- Right face -->
    <path d="M 150 -100 L 220 -180 L 220 70 L 150 150 Z" 
          fill="#E85555" stroke="#FF6B6B" stroke-width="4"/>
    
    <!-- Heart pips on front face -->
    <path d="M 0 -20 
             C 0 -40, -30 -40, -30 -10 
             C -30 10, 0 30, 0 30 
             C 0 30, 30 10, 30 -10
             C 30 -40, 0 -40, 0 -20Z" 
          fill="white" transform="translate(0, 25) scale(1.5)"/>
    
    <!-- Corner hearts -->
    <path d="M -100 -50 C -100 -60, -115 -60, -115 -50 C -115 -40, -100 -30, -100 -30 Z" fill="white" transform="scale(0.8)"/>
    <path d="M 100 -50 C 100 -60, 115 -60, 115 -50 C 115 -40, 100 -30, 100 -30 Z" fill="white" transform="scale(0.8)"/>
    <path d="M -100 100 C -100 90, -115 90, -115 100 C -115 110, -100 120, -100 120 Z" fill="white" transform="scale(0.8)"/>
    <path d="M 100 100 C 100 90, 115 90, 115 100 C 115 110, 100 120, 100 120 Z" fill="white" transform="scale(0.8)"/>
  </g>
  
  <!-- Sparks -->
  <g filter="url(#sparkGlow)">
    <circle cx="700" cy="300" r="15" fill="#FFD700"/>
    <circle cx="750" cy="250" r="10" fill="#FFA500"/>
    <circle cx="680" cy="200" r="12" fill="#FFD700"/>
    <circle cx="800" cy="350" r="8" fill="#FFA500"/>
    <circle cx="720" cy="180" r="10" fill="#FFD700"/>
  </g>
  
  <!-- Spark rays -->
  <g stroke="#FFD700" stroke-width="4" stroke-linecap="round">
    <line x1="700" y1="300" x2="750" y2="240"/>
    <line x1="700" y1="300" x2="760" y2="320"/>
    <line x1="700" y1="300" x2="670" y2="230"/>
  </g>
</svg>