services:
  relay:
    build: .
    restart: unless-stopped
    environment:
      RELAY_PORT: ${RELAY_PORT:-8787}
      RELAY_DATABASE_PATH: ${RELAY_DATABASE_PATH:-/data/relay.sqlite}
      RELAY_PUBLIC_BASE_URL: ${RELAY_PUBLIC_BASE_URL:-http://localhost:8787}
      RELAY_INVITE_TTL_SECONDS: ${RELAY_INVITE_TTL_SECONDS:-604800}
      RELAY_EVENT_RETENTION_DAYS: ${RELAY_EVENT_RETENTION_DAYS:-90}
      RELAY_MAX_PAYLOAD_BYTES: ${RELAY_MAX_PAYLOAD_BYTES:-16384}
      RELAY_RATE_LIMIT_WINDOW_SECONDS: ${RELAY_RATE_LIMIT_WINDOW_SECONDS:-60}
      RELAY_RATE_LIMIT_MAX_REQUESTS: ${RELAY_RATE_LIMIT_MAX_REQUESTS:-120}
    volumes:
      - relay-data:/data
    ports:
      - "127.0.0.1:8787:8787"

volumes:
  relay-data:
