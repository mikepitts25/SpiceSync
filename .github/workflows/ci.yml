name: CI - Test PRs & Main

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main

# Cancel in-progress runs on new pushes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: Code Quality
  lint-and-typecheck:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/mobile
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./apps/mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: 🔎 TypeScript Check
        run: npx tsc --noEmit
        continue-on-error: false

      - name: 🧹 ESLint Check
        run: npm run lint
        continue-on-error: false

      - name: 💅 Prettier Check
        run: npx prettier --check .
        continue-on-error: false

  # Job 2: Unit Tests
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/mobile
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./apps/mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: 🧪 Run Jest Tests
        run: npm test -- --ci --coverage --reporters=default --reporters=jest-junit
        continue-on-error: true

      - name: 📊 Upload Coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ./apps/mobile/coverage/

  # Job 3: Validate Kinks Data
  validate-kinks:
    name: 🔐 Validate Kinks Data
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./apps/mobile/package-lock.json

      - name: Install dependencies
        run: |
          cd apps/mobile
          npm ci

      - name: 🔐 Validate kinks.json files
        run: |
          cd apps/mobile
          node -e "
          try {
            const en = require('./data/kinks.en.json');
            const es = require('./data/kinks.es.json');
            
            console.log('✅ English kinks file loads:', en.length, 'items');
            console.log('✅ Spanish kinks file loads:', es.length, 'items');
            
            // Check for duplicate IDs
            const enIds = en.map(k => k.id);
            const esIds = es.map(k => k.id);
            const enDups = enIds.filter((item, index) => enIds.indexOf(item) !== index);
            const esDups = esIds.filter((item, index) => esIds.indexOf(item) !== index);
            
            if (enDups.length > 0) {
              console.error('❌ Duplicate IDs in English:', enDups);
              process.exit(1);
            }
            if (esDups.length > 0) {
              console.error('❌ Duplicate IDs in Spanish:', esDups);
              process.exit(1);
            }
            console.log('✅ No duplicate IDs found');
            
            // Check required fields
            const required = ['id', 'title', 'description', 'category'];
            for (const kink of [...en, ...es]) {
              for (const field of required) {
                if (!kink[field]) {
                  console.error('❌ Missing field', field, 'in kink:', kink.id);
                  process.exit(1);
                }
              }
            }
            console.log('✅ All kinks have required fields');
            
            console.log('\\n🎉 All kinks data validated!');
          } catch (err) {
            console.error('❌ Error:', err.message);
            process.exit(1);
          }
          "

  # Job 4: Test Build
  test-build:
    name: 🏗️ Test Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, validate-kinks]
    defaults:
      run:
        working-directory: ./apps/mobile
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./apps/mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: 🏗️ Test Expo Prebuild
        run: npx expo prebuild --platform ios --no-install
        env:
          CI: true

  # Job 5: Security Scan (Basic)
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 🔍 Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD
          extra_args: --debug --only-verified

  # Job 6: PR Summary
  pr-summary:
    name: 📝 PR Summary
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, unit-tests, validate-kinks, test-build, security-scan]
    if: github.event_name == 'pull_request' && success()
    steps:
      - name: 📊 Generate Summary
        run: |
          echo "## ✅ All Checks Passed!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 Lint & Type Check | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Unit Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔐 Kinks Data Validation | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏗️ Build Test | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔒 Security Scan | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Ready to merge!** 🚀" >> $GITHUB_STEP_SUMMARY

  # Job 7: Notify on Failure
  notify-failure:
    name: ❌ Notify on Failure
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, unit-tests, validate-kinks, test-build, security-scan]
    if: failure() && github.event_name == 'pull_request'
    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const failed = [];
            if ('${{ needs.lint-and-typecheck.result }}' !== 'success') failed.push('🔍 Lint & Type Check');
            if ('${{ needs.unit-tests.result }}' !== 'success') failed.push('🧪 Unit Tests');
            if ('${{ needs.validate-kinks.result }}' !== 'success') failed.push('🔐 Kinks Data Validation');
            if ('${{ needs.test-build.result }}' !== 'success') failed.push('🏗️ Build Test');
            if ('${{ needs.security-scan.result }}' !== 'success') failed.push('🔒 Security Scan');
            
            const body = `## ❌ Build Failed
            
            The following checks failed:
            ${failed.map(f => `- ${f}`).join('\\n')}
            
            Please fix the issues before merging.
            
            [View Details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
